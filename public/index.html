<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The $20 Dollar Game</title>

  <meta name="description" content="The $20 Dollar Game — one winner every day. No gimmicks. Real cash." />
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      background: #fff;
    }

    h1 { font-size: 3em; margin-top: 60px; }

    .nav {
      position: absolute;
      top: 15px;
      right: 25px;
    }

    .nav a {
      color: black;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }

    .sponsor-box {
      width: 500px;
      height: 140px;
      background: black;
      color: white;
      margin: 20px auto;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 2em;
    }

    #status { font-size: 1.4em; margin-top: 20px; }
    #clock { font-size: 2em; }

    .game-container {
      margin: 40px auto;
      width: 600px;
    }

    canvas {
      background: #111;
      border-radius: 8px;
    }

    #leaderboard {
      margin-top: 15px;
      font-size: 14px;
    }

    #leaderboard div {
      margin: 2px 0;
    }

    #winner-ticker {
      background: #000;
      color: #fff;
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 0.5em;
      white-space: nowrap;
      overflow: hidden;
    }

    #ticker-text {
      display: inline-block;
      animation: scrollText 25s linear infinite;
    }

    @keyframes scrollText {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .hidden { display:none; }
  </style>

  <script async src="https://www.google.com/recaptcha/api.js"></script>
</head>

<body>

<div class="nav">
  <a href="faq.html">FAQ</a>
  <a href="contact.html">Contact</a>
</div>

<h1>THE 20 DOLLAR GAME</h1>

<div class="sponsor-box">YOUR LOGO HERE</div>

<div id="status">Loading...</div>
<div id="clock" class="hidden">01:00</div>

<!-- GAME -->
<div class="game-container">
  <canvas id="game" width="600" height="400"></canvas>

  <div id="leaderboard">
    <strong>Global High Scores</strong>
    <div id="scores"></div>
  </div>
</div>

<!-- TICKER -->
<div id="winner-ticker">
  <span id="ticker-text">Loading winners...</span>
</div>

<script>

/* ------------------ GAME ------------------ */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake = [{x:10,y:10}];
let dir = {x:1,y:0};
let food = {x:15,y:15};
let score = 0;

function draw() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,600,400);

  // snake
  ctx.fillStyle = "lime";
  snake.forEach(s=>{
    ctx.fillRect(s.x*20, s.y*20, 18, 18);
  });

  // $20 bill
  ctx.fillStyle = "gold";
  ctx.fillRect(food.x*20, food.y*20, 18, 18);

  ctx.fillStyle = "white";
  ctx.fillText("$20", food.x*20, food.y*20+12);

  ctx.fillText("Score: "+score, 10, 20);
}

function update() {
  const head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  head.x = (head.x+30)%30;
  head.y = (head.y+20)%20;

  snake.unshift(head);

  if(head.x === food.x && head.y === food.y){
    score++;
    food = {
      x: Math.floor(Math.random()*30),
      y: Math.floor(Math.random()*20)
    };
  } else {
    snake.pop();
  }

  // collision
  for(let i=1;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){
      saveScore(score);
      resetGame();
    }
  }
}

function loop(){
  update();
  draw();
}
setInterval(loop,120);

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp") dir={x:0,y:-1};
  if(e.key==="ArrowDown") dir={x:0,y:1};
  if(e.key==="ArrowLeft") dir={x:-1,y:0};
  if(e.key==="ArrowRight") dir={x:1,y:0};
});

function resetGame(){
  snake=[{x:10,y:10}];
  dir={x:1,y:0};
  score=0;
}

/* ------------------ GLOBAL LEADERBOARD ------------------ */

async function saveScore(score) {
  if(score < 1) return;

  await fetch("/score", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ score })
  });
}

async function loadScores() {
  const res = await fetch("/scores");
  const data = await res.json();

  const el = document.getElementById("scores");
  el.innerHTML = data.map((s,i)=>`${i+1}. ${s.score}`).join("<br>");
}

setInterval(loadScores, 3000);
loadScores();

/* ------------------ SITE LOGIC ------------------ */

const statusEl = document.getElementById("status");
const clockEl = document.getElementById("clock");

const quotes = [
  "Try again tomorrow.",
  "Stay in the game.",
  "You're closer than you think."
];

async function fetchState(){
  const res = await fetch("/state");
  return await res.json();
}

async function loadTicker(){
  const { recent } = await fetchState();
  const text = recent.length
    ? "Recent winners: " + recent.map(x => x.payout_id).join(" • ")
    : "No winners yet";
  document.getElementById("ticker-text").textContent = text;
}

async function updateUI(){
  const { openWindow, remaining, isNewDay, hasWinnerToday } = await fetchState();

  if(isNewDay && !openWindow){
    statusEl.textContent = "Today's $20 hasn't been claimed yet — stay tuned!";
    return;
  }

  if(openWindow && remaining>0){
    clockEl.classList.remove("hidden");

    const m = Math.floor(remaining/60);
    const s = remaining%60;
    clockEl.textContent = `${m}:${s.toString().padStart(2,"0")}`;

    statusEl.textContent = "Drop is live — go enter!";
    return;
  }

  if(!openWindow && !hasWinnerToday){
    statusEl.textContent = quotes[Math.floor(Math.random()*quotes.length)];
    return;
  }

  if(hasWinnerToday){
    statusEl.textContent = "Today's $20 has been claimed — come back tomorrow 6–9 PM PST.";
  }
}

setInterval(updateUI,2000);
setInterval(loadTicker,5000);

loadTicker();
updateUI();

</script>

</body>
</html>
