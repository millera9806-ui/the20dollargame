<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The $20 Dollar Game</title>

<link rel="icon" type="image/png" href="favicon.png"/>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  background: #fff;
}

h1 { font-size: 3em; margin-top: 60px; }

.sponsor-box {
  width: 500px;
  height: 140px;
  background: black;
  color: white;
  margin: 20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 2em;
}

#status { font-size: 1.4em; margin-top: 20px; }
#clock { font-size: 2em; }

form { margin-top: 15px; }

.game-container {
  margin: 40px auto;
  width: 600px;
}

canvas {
  background: #111;
  border-radius: 8px;
}

.hidden { display:none; }
</style>
</head>

<body>

<h1>THE 20 DOLLAR GAME</h1>

<div class="sponsor-box">YOUR LOGO HERE</div>

<div id="status">Loading...</div>
<div id="clock" class="hidden">01:00</div>

<form id="claim-form" class="hidden">
  <select id="method">
    <option value="">Select payout</option>
    <option>Venmo</option>
    <option>PayPal</option>
    <option>CashApp</option>
  </select>

  <input id="handle" placeholder="@handle" />

  <button type="submit">Gimme that $20</button>
</form>

<div id="gameWrapper" class="game-container">
  <canvas id="game" width="600" height="400"></canvas>
</div>

<script>

/* ---------------- QUOTES ---------------- */

const quotes = [
"Success is not final, failure is not fatal: it is the courage to continue that counts. — Winston Churchill",
"Our greatest glory is not in never failing, but in rising every time we fall. — Confucius",
"It does not matter how slowly you go as long as you do not stop. — Confucius",
"Failure is simply the opportunity to begin again, this time more intelligently. — Henry Ford",
"I have not failed. I've just found 10,000 ways that won't work. — Thomas Edison",
"Only those who dare to fail greatly can ever achieve greatly. — Robert F. Kennedy",
"Fall seven times, stand up eight. — Japanese Proverb",
"You may encounter many defeats, but you must not be defeated. — Maya Angelou",
"It always seems impossible until it’s done. — Nelson Mandela",
"Try again. Fail again. Fail better. — Samuel Beckett",
"Do not be embarrassed by your failures, learn from them and start again. — Richard Branson",
"Failure is success in progress. — Albert Einstein",
"Success usually comes to those who are too busy to be looking for it. — Henry David Thoreau",
"A person who never made a mistake never tried anything new. — Albert Einstein",
"Perseverance is failing 19 times and succeeding the 20th. — Julie Andrews",
"The secret of life is to fall seven times and to get up eight times. — Paulo Coelho",
"Courage doesn’t always roar. Sometimes courage is the quiet voice… I will try again tomorrow. — Mary Anne Radmacher",
"Energy and persistence conquer all things. — Benjamin Franklin",
"What defines us is how well we rise after falling. — Lionel Messi",
"You just can’t beat the person who never gives up. — Babe Ruth",
"Many of life’s failures are people who did not realize how close they were to success when they gave up. — Thomas Edison",
"Keep going. Everything you need will come to you at the perfect time. — Napoleon Hill",
"Winners are not afraid of losing. But losers are. Failure is part of the process of success. — Robert Kiyosaki",
"Act as if what you do makes a difference. It does. — William James",
"Don’t watch the clock; do what it does. Keep going. — Sam Levenson"
];

/* ---------------- GAME ---------------- */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake=[{x:10,y:10}];
let dir={x:1,y:0};
let food={x:15,y:15};

function draw(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,600,400);

  ctx.fillStyle="lime";
  snake.forEach(s=>ctx.fillRect(s.x*20,s.y*20,18,18));

  ctx.fillStyle="gold";
  ctx.fillRect(food.x*20,food.y*20,18,18);
}

function update(){
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  head.x=(head.x+30)%30;
  head.y=(head.y+20)%20;

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    food={x:Math.random()*30|0,y:Math.random()*20|0};
  } else {
    snake.pop();
  }
}

setInterval(()=>{update();draw();},120);

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp")dir={x:0,y:-1};
  if(e.key==="ArrowDown")dir={x:0,y:1};
  if(e.key==="ArrowLeft")dir={x:-1,y:0};
  if(e.key==="ArrowRight")dir={x:1,y:0};
});

/* ---------------- SITE ---------------- */

const statusEl = document.getElementById("status");
const clockEl = document.getElementById("clock");
const formEl = document.getElementById("claim-form");
const gameEl = document.getElementById("gameWrapper");

let userResult = null;

async function fetchState(){
  const res = await fetch("/state");
  return await res.json();
}

async function updateUI(){
  const { openWindow, remaining, isNewDay, hasWinnerToday } = await fetchState();

  // BEFORE DROP
  if(isNewDay && !openWindow){
    formEl.classList.add("hidden");
    gameEl.classList.remove("hidden");
    statusEl.textContent="Today's $20 hasn't been claimed yet — stay tuned!";
    return;
  }

  // DROP LIVE
  if(openWindow && remaining>0){
    const m=Math.floor(remaining/60);
    const s=remaining%60;

    clockEl.textContent=`${m}:${s.toString().padStart(2,"0")}`;
    clockEl.classList.remove("hidden");

    formEl.classList.remove("hidden");
    gameEl.classList.add("hidden");

    statusEl.textContent="ENTER NOW";
    return;
  }

  // AFTER ENTRY
  if(userResult && !openWindow){
    formEl.classList.add("hidden");
    gameEl.classList.remove("hidden");

    if(userResult.winner){
      statusEl.textContent = "You've won! Please allow 5 minutes for payment to process. Have a problem? Email support at: the20dollargamesupport@gmail.com";
    } else {
      const q = quotes[Math.floor(Math.random()*quotes.length)];
      statusEl.textContent = q;
    }
    return;
  }

  // FINAL STATE
  if(hasWinnerToday){
    formEl.classList.add("hidden");
    gameEl.classList.remove("hidden");

    statusEl.textContent="Today's $20 has been claimed — come back tomorrow between 6–9 PM PST.";
  }
}

/* CLAIM */

formEl.addEventListener("submit", async e=>{
  e.preventDefault();

  const res=await fetch("/claim",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      payout_method:method.value,
      payout_id:handle.value,
      captcha:"test"
    })
  });

  userResult=await res.json();
});

setInterval(updateUI,2000);
updateUI();

</script>

</body>
</html>
